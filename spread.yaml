project: rocm-qa
path: /root/rocm-qa
backends:
  tchavadar:
    type: adhoc
    wait-timeout: 2h
    kill-timeout: 12h
    halt-timeout: 3h
    discard: echo "Discarding $SPREAD_SYSTEM..."
    allocate: |
      echo "Allocating $SPREAD_SYSTEM..."
      ADDRESS 10.17.99.227:22
    restore: |
      sudo rm -rf /root/rocm-qa
    systems:
      - gfx-1201:
          username: talha
          ssh-rsa-key: '$(HOST: echo "$SPREAD_SSH_KEY")'
          # ssh-key-pass: '$(HOST: echo "$SPREAD_SSH_KEY_PASS")'
          environment:
            DEB_BUILD_OPTIONS: "parallel=4"
  bare-gfx1151:
    type: adhoc
    wait-timeout: 2h
    kill-timeout: 12h
    halt-timeout: 3h
    discard: echo "Discarding $SPREAD_SYSTEM..."
    allocate: |
      echo "Allocating $SPREAD_SYSTEM..."
      ADDRESS 192.168.1.53:22
    restore: |
      sudo rm -rf /root/rocm-qa
    systems:
      - gfx-1151:
          username: canonical
          ssh-rsa-key: '$(HOST: echo "$SPREAD_SSH_KEY")'
          # ssh-key-pass: '$(HOST: echo "$SPREAD_SSH_KEY_PASS")'
          environment:
            DEB_BUILD_OPTIONS: "parallel=79"
prepare: |
  echo "Creating LXD 'rocm-gpu' profile"

  # Install/refresh LXD
  snap install lxd --channel=latest/stable 2>/dev/null || snap refresh lxd --channel=latest/stable || true

  # User group setup
  usermod -a -G lxd $USER
  usermod -a -G render,video $USER

  # LXD initialization (skip if already initialized)
  lxd waitready
  lxd init --auto 2>/dev/null || true

  # Clean up existing profile/storage if they exist
  lxc profile show rocm-gpu &>/dev/null && lxc profile delete rocm-gpu || true
  lxc storage show rocm-gpu-pool &>/dev/null && lxc storage delete rocm-gpu-pool || true

  # Create fresh profile and storage
  lxc profile create rocm-gpu
  lxc storage create rocm-gpu-pool dir

  # Configure profile devices
  lxc profile device add rocm-gpu root disk path=/ pool=rocm-gpu-pool
  lxc profile device add rocm-gpu kfd unix-char path=/dev/kfd mode=0666 uid=0 gid=992 required=true

  for i in /dev/dri/renderD*; do
    name=$(basename "$i")
    lxc profile device add rocm-gpu "$name" unix-char path="$i" mode=0666 uid=0 gid=992 required=true
  done

  lxc profile device add rocm-gpu eth0 nic network=lxdbr0
  lxc profile device add rocm-gpu gpu gpu

  lxc profile set rocm-gpu limits.cpu.allowance=80%
  lxc profile set rocm-gpu limits.memory=90%
  lxc profile set rocm-gpu limits.memory.enforce=soft

  lxc profile show rocm-gpu

  DEBIAN_FRONTEND=noninteractive apt update
  DEBIAN_FRONTEND=noninteractive apt install -y \
    software-properties-common autopkgtest
suites:
  tests/:
    summary: integration tests for rocm stack
