name: "Test ROCm - COMM-ML"
on:
  schedule:
    - cron: "0 2 * * 4" # Thursday at 02:00 UTC
  workflow_dispatch:
jobs:
  run-tests:
    uses: ./.github/workflows/run-tests.yml
    secrets: inherit
    with:
      spread-params-extra: ${{ vars.ROCM_COMM_ML_PACKAGES }}
  parse-results:
    needs:
      - run-tests
    uses: ./.github/workflows/parse-results.yml
    secrets: inherit
    with:
      spread-results-artifact-id: ${{ needs.run-tests.outputs.spread-results-artifact-id }}
