name: "Test ROCm - [ROC-3]"
on:
  schedule:
    - cron: "0 5 2-30/2 * *" # On even days at 05:00 UTC
  workflow_dispatch:
jobs:
  run-tests:
    uses: ./.github/workflows/run-tests.yml
    secrets: inherit
    with:
      spread-params-extra: ${{ vars.ROCM_ROC3_PACKAGES }}
  parse-results:
    needs:
      - run-tests
    uses: ./.github/workflows/parse-results.yml
    secrets: inherit
    with:
      spread-results-artifact-id: ${{ needs.run-tests.outputs.spread-results-artifact-id }}
