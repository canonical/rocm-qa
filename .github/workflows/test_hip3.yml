name: "Test ROCm - [HIP-3]"
on:
  schedule:
    - cron: "0 3 1-31/2 * *" # On odd days at 03:00 UTC
  workflow_dispatch:
jobs:
  run-tests:
    uses: ./.github/workflows/run-tests.yml
    secrets: inherit
    with:
      spread-params-extra: ${{ vars.ROCM_HIP3_PACKAGES }}
  parse-results:
    needs:
      - run-tests
    uses: ./.github/workflows/parse-results.yml
    secrets: inherit
    with:
      spread-results-artifact-id: ${{ needs.run-tests.outputs.spread-results-artifact-id }}
